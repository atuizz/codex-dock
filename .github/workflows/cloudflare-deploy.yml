name: Cloudflare Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

jobs:
  verify:
    name: Verify release candidate
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloud-worker/package-lock.json

      - name: Install Cloudflare Worker dependencies
        working-directory: cloud-worker
        run: npm ci

      - name: Run release preflight
        run: npm run preflight

      - name: Upload verified Helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexDockHelper-${{ github.sha }}
          path: artifacts/build/CodexDockHelper/
          if-no-files-found: error

  deploy:
    name: Cloudflare ${{ inputs.target }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment: ${{ inputs.target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloud-worker/package-lock.json

      - name: Install Cloudflare Worker dependencies
        working-directory: cloud-worker
        run: npm ci

      - name: Build static assets
        working-directory: cloud-worker
        run: npm run build

      - name: Preview deploy dry run
        if: inputs.target == 'preview'
        working-directory: cloud-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --dry-run --outdir .wrangler-dry-run

      - name: Guard production branch
        if: inputs.target == 'production' && github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main'
        run: |
          echo "Production deploys must run from master or main."
          exit 1

      - name: Apply production D1 migrations
        if: inputs.target == 'production'
        working-directory: cloud-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply codex-cloud-console --remote

      - name: Deploy production Worker
        if: inputs.target == 'production'
        working-directory: cloud-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Smoke test production deployment
        if: inputs.target == 'production'
        working-directory: cloud-worker
        env:
          CODEX_DOCK_REQUIRE_LOCAL_HELPER_HASH: "1"
        run: npm run smoke:production
