name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify Worker, UI, and Helper
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloud-worker/package-lock.json

      - name: Install Cloudflare Worker dependencies
        working-directory: cloud-worker
        run: npm ci

      - name: Build Windows Helper
        shell: pwsh
        run: .\native-helper\build-helper.ps1

      - name: Build Cloudflare static assets
        working-directory: cloud-worker
        run: npm run build

      - name: Run verification scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -File scripts -Filter 'verify-*' |
            Where-Object { $_.Name -ne 'verify-production-smoke.mjs' } |
            Sort-Object Name |
            ForEach-Object {
              Write-Host "Running $($_.Name)"
              node $_.FullName
              if ($LASTEXITCODE -ne 0) {
                exit $LASTEXITCODE
              }
            }

      - name: Upload Helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexDockHelper
          path: dist/CodexDockHelper/
          if-no-files-found: error
