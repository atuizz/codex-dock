name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify Worker, UI, and Helper
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CHECKOUT_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloud-worker/package-lock.json

      - name: Install Cloudflare Worker dependencies
        working-directory: cloud-worker
        run: npm ci

      - name: Run release preflight
        run: npm run preflight

      - name: Upload Helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexDockHelper
          path: artifacts/build/CodexDockHelper/
          if-no-files-found: error
